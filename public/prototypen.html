<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prototypen — AMERO FlexPOS Onboarding</title>
    <meta
      name="description"
      content="Interaktiv Figma-prototype af det nye onboarding-flow til FlexPOS."
    />
    <meta property="og:title" content="Prototypen — AMERO" />
    <meta property="og:description" content="Afprøv det interaktive onboarding-flow." />

    <!-- Preconnect mod Figmas domæner sparer DNS/TLS-tid før iframen loader. -->
    <link rel="preconnect" href="https://embed.figma.com" crossorigin />
    <link rel="preconnect" href="https://www.figma.com" crossorigin />
    <link rel="preconnect" href="https://static.figma.com" crossorigin />
    <link rel="dns-prefetch" href="https://embed.figma.com" />

    <style>
      /* ---------- Reset / base ---------- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, "Helvetica Neue", Arial, sans-serif;
        color: #1a1a1a;
        background: #ffffff;
        line-height: 1.5;
      }
      h1,
      h2,
      p {
        margin: 0;
      }
      a {
        color: inherit;
      }

      /* ---------- Layout ---------- */
      .section {
        padding: 2rem 1rem;
      }
      .container {
        max-width: 64rem; /* ~1024px, samme som max-w-4xl/5xl-zonen */
        margin: 0 auto;
      }
      .intro {
        background: #f6f5f1; /* svarer til bg-softer */
        max-width: none;
      }
      .intro .container {
        max-width: 56rem;
      }
      .intro h1 {
        font-size: clamp(1.875rem, 4vw, 2.25rem);
        color: #2a2a2a;
      }
      .intro p {
        margin-top: 0.75rem;
        font-size: 1rem;
        max-width: 42rem;
      }

      /* ---------- Embed-kort ---------- */
      .embed-wrap {
        padding: 1.5rem 1rem;
      }
      .card {
        margin: 0 auto;
        width: 100%;
        max-width: 80rem;
        background: #ffffff;
        padding: 15px;
        border-radius: 0.75rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .card-toolbar {
        display: none; /* Skjult på desktop, vises kun på mobil via media query */
        justify-content: flex-end;
        padding-bottom: 0.5rem;
      }
      .fs-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #2a2a2a;
        color: #ffffff;
        border: 0;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: 0.375rem;
        cursor: pointer;
        font-family: inherit;
      }
      .fs-btn svg {
        width: 1rem;
        height: 1rem;
      }
      .fs-btn .icon-min {
        display: none;
      }

      /* Aspect-ratio-wrapper: padding-bottom 60% holder iframen proportional. */
      .iframe-box {
        position: relative;
        width: 100%;
        overflow: hidden;
        border-radius: 0.5rem;
        background: #ffffff;
        padding-bottom: 60%;
      }
      .iframe-box iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      /* ---------- Fullscreen-tilstand (CSS-fallback hvis Fullscreen API fejler) ---------- */
      .card.is-fullscreen {
        position: fixed;
        inset: 0;
        z-index: 50;
        max-width: none;
        border-radius: 0;
        padding: 0.5rem;
        display: flex;
        flex-direction: column;
        box-shadow: none;
      }
      .card.is-fullscreen .iframe-box {
        flex: 1;
        padding-bottom: 0; /* fyld resten af pladsen */
      }
      .card.is-fullscreen .fs-btn .icon-max {
        display: none;
      }
      .card.is-fullscreen .fs-btn .icon-min {
        display: inline;
      }

      /* ---------- Mobil: vis fullscreen-knappen ---------- */
      @media (max-width: 767px) {
        .card-toolbar {
          display: flex;
        }
      }

      /* ---------- CTA-sektion ---------- */
      .cta {
        background: #2a2a2a;
        color: #ffffff;
        text-align: center;
      }
      .cta .container {
        max-width: 56rem;
      }
      .cta a {
        display: inline-block;
        background: #ffffff;
        color: #2a2a2a;
        padding: 0.75rem 1.5rem;
        border-radius: 0.125rem;
        font-weight: 500;
        text-decoration: none;
      }
      .cta a:hover {
        opacity: 0.9;
      }

      /* Skjul visuelt, men behold for skærmlæsere. */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main id="main">
      <!-- Intro-sektion -->
      <section class="section intro" aria-labelledby="intro">
        <div class="container">
          <h1 id="intro">Prototypen</h1>
          <p>
            Dette er en interaktiv Figma-prototype af det nye onboarding-flow til
            FlexPOS. Den er designet til at være tilgængelig for alle — uanset
            teknisk erfaringsniveau. Klik dig igennem flowet nedenfor.
          </p>
        </div>
      </section>

      <!-- Embed -->
      <section aria-labelledby="embed">
        <h2 id="embed" class="sr-only">Interaktiv prototype</h2>
        <div class="embed-wrap">
          <div class="card" id="card">
            <div class="card-toolbar">
              <button
                type="button"
                class="fs-btn"
                id="fsBtn"
                aria-label="Vis i fuld skærm"
              >
                <!-- Maximize-ikon (Lucide) -->
                <svg
                  class="icon-max"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M8 3H5a2 2 0 0 0-2 2v3" />
                  <path d="M21 8V5a2 2 0 0 0-2-2h-3" />
                  <path d="M3 16v3a2 2 0 0 0 2 2h3" />
                  <path d="M16 21h3a2 2 0 0 0 2-2v-3" />
                </svg>
                <!-- Minimize-ikon (Lucide) -->
                <svg
                  class="icon-min"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M8 3v3a2 2 0 0 1-2 2H3" />
                  <path d="M21 8h-3a2 2 0 0 1-2-2V3" />
                  <path d="M3 16h3a2 2 0 0 1 2 2v3" />
                  <path d="M16 21v-3a2 2 0 0 1 2-2h3" />
                </svg>
                <span class="fs-label">Fuld skærm</span>
              </button>
            </div>

            <div class="iframe-box">
              <iframe
                title="FlexPOS onboarding prototype"
                src="https://embed.figma.com/proto/lJH1sQMRckEgrwtfUsJ69i/Hovedopgave?node-id=21-468&scaling=scale-down-width&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=21%3A468&embed-host=share&hide-ui=1&bg-color=FFFFFF"
                scrolling="no"
                allowfullscreen
                loading="eager"
              ></iframe>
            </div>
          </div>
        </div>
      </section>

      <!-- CTA -->
      <section class="section cta" aria-labelledby="videre">
        <div class="container">
          <h2 id="videre" class="sr-only">Næste skridt</h2>
          <a href="/designguiden">Se Designguiden</a>
        </div>
      </section>
    </main>

    <script>
      // Lille vanilla JS-håndtering af fullscreen-knappen.
      // Bruger browserens Fullscreen API når muligt; falder ellers tilbage til
      // at toggle en CSS-klasse som dækker hele viewport.
      (function () {
        var card = document.getElementById("card");
        var btn = document.getElementById("fsBtn");
        var label = btn.querySelector(".fs-label");

        function setState(isFs) {
          card.classList.toggle("is-fullscreen", isFs);
          btn.setAttribute(
            "aria-label",
            isFs ? "Luk fuld skærm" : "Vis i fuld skærm"
          );
          label.textContent = isFs ? "Luk fuld skærm" : "Fuld skærm";
        }

        btn.addEventListener("click", async function () {
          try {
            if (!document.fullscreenElement) {
              if (card.requestFullscreen) {
                await card.requestFullscreen();
              } else {
                // Fallback for browsere uden Fullscreen API (fx Safari iOS).
                setState(!card.classList.contains("is-fullscreen"));
              }
            } else {
              await document.exitFullscreen();
            }
          } catch (e) {
            // Hvis API'et fejler, så toggle bare CSS-klassen manuelt.
            setState(!card.classList.contains("is-fullscreen"));
          }
        });

        // Synkroniser knappens label når brugeren forlader fullscreen via Esc.
        document.addEventListener("fullscreenchange", function () {
          setState(!!document.fullscreenElement);
        });
      })();
    </script>
  </body>
</html>
